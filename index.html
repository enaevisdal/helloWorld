<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Trainer</title>

    <!--
        Her ser du hvordan vi LINKER til separate filer i stedet for
        å ha alt i én fil. Nettleseren henter og bruker dem automatisk.

        Rekkefølgen betyr noe:
        1. main.css først (grunnleggende styling)
        2. Spill-spesifikk CSS etterpå (overstyrer/utvider)
    -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/memory.css">
    <link rel="stylesheet" href="styles/sequence.css">
</head>
<body>

    <h1>Memory Trainer</h1>
    <p>Tren hukommelsen din med ulike spill!</p>

    <!-- ================================
         SPILLVELGER — fanene øverst
         ================================ -->
    <div class="game-selector">
        <button class="game-tab active" onclick="switchGame('memory')">
            🃏 Memory
        </button>
        <button class="game-tab" onclick="switchGame('sequence')">
            🎨 Colour Sequence
        </button>
    </div>

    <!-- ================================
         SPILL 1: MEMORY
         ================================ -->
    <div id="game-memory" class="game-area active">
        <div class="stats">
            <span>Forsøk: <strong id="memory-attempts">0</strong></span>
            <span>Par funnet: <strong id="memory-matches">0</strong> / <strong id="memory-total">0</strong></span>
        </div>

        <div class="memory-board" id="memory-board"></div>

        <button class="btn" onclick="startMemory()">Nytt spill</button>
        <div class="result-message" id="memory-result">Gratulerer! Du klarte det!</div>

        <div class="highscores">
            <h2>Topp 5 — færrest forsøk</h2>
            <div id="memory-highscores"></div>
        </div>
    </div>

    <!-- ================================
         SPILL 2: COLOUR SEQUENCE
         ================================ -->
    <div id="game-sequence" class="game-area">
        <div class="level-info" id="sequence-level">Runde 1 — husk 3 farger</div>
        <div class="sequence-status" id="sequence-status"></div>

        <div class="sequence-display" id="sequence-display"></div>
        <div class="colour-grid" id="colour-grid"></div>

        <button class="btn" onclick="startSequence()">Nytt spill</button>
        <div class="result-message" id="sequence-result"></div>

        <div class="highscores">
            <h2>Topp 5 — høyeste nivå</h2>
            <div id="sequence-highscores"></div>
        </div>
    </div>

    <!--
        JavaScript-filene lastes NEDERST i <body>.
        Hvorfor? Fordi HTML-en må finnes FØR JavaScript prøver
        å finne elementer med getElementById() osv.

        Tenk på det som: du kan ikke lete i en bok
        som ikke er skrevet ennå.
    -->
    <script src="scripts/memory.js"></script>
    <script src="scripts/sequence.js"></script>

    <!-- Denne lille biten "limer sammen" spillvelgeren og spillene -->
    <script>
        /**
         * Bytter mellom spillene.
         * Viser det valgte spillet og skjuler det andre.
         *
         * Denne funksjonen er et godt eksempel på HVORFOR vi
         * splitter i filer: hvert spill vet ingenting om det andre.
         * Denne "lim-koden" er den eneste som kjenner begge.
         */
        function switchGame(gameName) {
            // Skjul alle spillområder
            document.querySelectorAll('.game-area').forEach(function(area) {
                area.classList.remove('active');
            });
            // Vis det valgte
            document.getElementById('game-' + gameName).classList.add('active');

            // Oppdater fanene
            document.querySelectorAll('.game-tab').forEach(function(tab) {
                tab.classList.remove('active');
            });
            // Finn fanen som ble klikket og marker den
            event.target.classList.add('active');
        }

        // Start begge spillene når siden lastes
        startMemory();
        startSequence();
    </script>

</body>
</html>
